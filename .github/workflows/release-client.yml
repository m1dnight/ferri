name: release-client

on:
  push:
    tags:
      - 'v*'
    branches:
      - windows-ci
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ferri-client/ferri

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        working-directory: ferri-client/ferri
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        working-directory: ferri-client/ferri
        run: |
          mkdir -p dist
          NAME=ferri-${GITHUB_REF_NAME}-${{ matrix.target }}
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN=target/${{ matrix.target }}/release/ferri.exe
            7z a -tzip dist/${NAME}.zip ./${BIN}
            (cd dist && sha256sum ${NAME}.zip > ${NAME}.zip.sha256)
          else
            BIN=target/${{ matrix.target }}/release/ferri
            tar czf dist/${NAME}.tar.gz -C $(dirname $BIN) $(basename $BIN)
            (cd dist && shasum -a 256 ${NAME}.tar.gz > ${NAME}.tar.gz.sha256)
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ferri-${{ matrix.target }}
          path: ferri-client/ferri/dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
